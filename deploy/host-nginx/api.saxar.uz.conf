# API uchun alohida server_name — boshqa virtual hostlarga ta'sir qilmaydi.
# default_server QO‘SHMANG (boshqa saytlarning HTTPS sertifikatiga aralashadi).
#
# SSL: bu fayl /etc/letsencrypt/live/api.saxar.uz/ ni kutadi (alohida certbot).
# Agar faqat saxar.uz uchun sert bo'lsa va ichida api.saxar.uz SAN bo'lmasa —
# brauzer NET::ERR_CERT_COMMON_NAME_INVALID beradi. Yechim:
#   - certbot --expand bilan bitta sertga api qo'shing, keyin
#     api.saxar.uz.shared-with-saxar-cert.conf dan foydalaning; YOKI
#   - alohida: certbot -d api.saxar.uz (ushbu fayl bilan).
#
#   sudo cp deploy/host-nginx/api.saxar.uz.conf /etc/nginx/sites-available/api.saxar.uz.conf
#   sudo ln -sf /etc/nginx/sites-available/api.saxar.uz.conf /etc/nginx/sites-enabled/api.saxar.uz.conf
#
#   sudo certbot certonly --webroot -w /var/www/html -d api.saxar.uz

# Nom saxar.uz.conf dagi saxar_api_upstream bilan takrorlanmasin (nginx bitta upstream nomi — bitta joy).
upstream saxar_api_upstream_subdomain {
    server 127.0.0.1:18181;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.saxar.uz;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location = / {
        return 301 https://api.saxar.uz/api/;
    }
    location / {
        return 301 https://api.saxar.uz$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.saxar.uz;

    ssl_certificate     /etc/letsencrypt/live/api.saxar.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.saxar.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    location = / {
        return 302 /api/;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://saxar_api_upstream_subdomain;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
