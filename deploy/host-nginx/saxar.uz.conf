# Yangi fayl: boshqa saytlarning konfiglariga tegmang.
# Joylashuv (Debian/Ubuntu odatiy):
#   sudo cp deploy/host-nginx/saxar.uz.conf /etc/nginx/sites-available/saxar.uz.conf
#   sudo ln -sf /etc/nginx/sites-available/saxar.uz.conf /etc/nginx/sites-enabled/saxar.uz.conf
#
# SSL: agar saxar.uz va api uchun alohida sertifikat bo'lsa, yo'llarni moslang.
#   sudo certbot certonly --nginx -d saxar.uz -d www.saxar.uz

upstream saxar_frontend_upstream {
    server 127.0.0.1:18180;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name saxar.uz www.saxar.uz;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://saxar.uz$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.saxar.uz;
    ssl_certificate     /etc/letsencrypt/live/saxar.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saxar.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://saxar.uz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name saxar.uz;

    ssl_certificate     /etc/letsencrypt/live/saxar.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saxar.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://saxar_frontend_upstream;
        proxy_read_timeout 120s;
    }
}
