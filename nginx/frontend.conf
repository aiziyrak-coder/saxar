# SPA + API reverse proxy (Docker Compose: `api` xizmati 8000-portda).
# Faqat statik build: `api` hosti yo‘q — to‘liq stack uchun `docker compose up` ishlating.

upstream saxar_api {
    server api:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Brauzer odatda /favicon.ico so'raydi — fayl bo'lmasa 404
    location = /favicon.ico {
        return 302 /favicon.svg;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Django ALLOWED_HOSTS da doim bo'ladigan Docker servis nomi (tashqi Host saxar.uz bo'lsa ham 400 bermaslik uchun)
        proxy_set_header Host api;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://saxar_api;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /api-auth/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host api;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://saxar_api;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
